<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>BCC · 資訊科技課程作業系統</title>
<link rel="stylesheet" href="tokens.css" />
<style>
  html, body, #root { margin: 0; padding: 0; min-height: 100%; }
  body { background: var(--bg-page, #f5f4f0); }
  /* 系統共用 input/btn 樣式 (覆蓋畫面用) */
  .input { width: 100%; padding: 9px 12px; border: 1px solid var(--border-color, #d8d2c5); border-radius: 8px; font-size: 14px; font-family: inherit; background: white; box-sizing: border-box; }
  .input:focus { outline: none; border-color: var(--brand-500); box-shadow: 0 0 0 3px var(--brand-100); }
  .input:disabled { background: var(--bg-soft, #f5f1eb); color: var(--ink-500); }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: 8px; border: 1px solid transparent; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
  .btn-primary { background: var(--brand-500); color: white; }
  .btn-primary:hover { background: var(--brand-600); }
  .btn-primary:disabled { background: var(--brand-300); cursor: not-allowed; }
  .btn-ghost { background: transparent; color: var(--ink-700); border-color: var(--border-color, #d8d2c5); }
  .btn-ghost:hover { background: var(--bg-soft, #f5f1eb); }
  .btn-sm { padding: 6px 10px; font-size: 12px; }
  .card { background: white; border: var(--border-soft); border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
  .mono { font-family: var(--font-mono); }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root">
  <div style="text-align:center; padding:40px; color:#888;">載入中…</div>
</div>

<script type="text/babel" src="components/icons.jsx"></script>
<script type="text/babel" src="connection-tool.jsx"></script>
<script type="text/babel" src="live/app.jsx"></script>
<script type="text/babel" src="live/student.jsx"></script>
<script type="text/babel" src="live/teacher.jsx"></script>
<script type="text/babel" src="live/assignments-admin.jsx"></script>

<script type="text/babel" data-presets="env,react">
  // 啟動前自動把 hue 顏色變數塞進 CSS(使用設計系統的預設值)
  document.documentElement.style.setProperty('--brand-50',  'oklch(0.97 0.015 255)');
  document.documentElement.style.setProperty('--brand-100', 'oklch(0.93 0.035 255)');
  document.documentElement.style.setProperty('--brand-200', 'oklch(0.85 0.07 255)');
  document.documentElement.style.setProperty('--brand-300', 'oklch(0.74 0.11 255)');
  document.documentElement.style.setProperty('--brand-400', 'oklch(0.62 0.14 255)');
  document.documentElement.style.setProperty('--brand-500', 'oklch(0.50 0.16 255)');
  document.documentElement.style.setProperty('--brand-600', 'oklch(0.42 0.15 255)');
  document.documentElement.style.setProperty('--brand-700', 'oklch(0.34 0.12 255)');
  document.documentElement.style.setProperty('--brand-800', 'oklch(0.27 0.09 255)');

  function Root() {
    const [showTool, setShowTool] = React.useState(!window.BCC_API.getApiUrl());
    return <>
      <window.LiveApp />
      {showTool && <window.ConnectionTool />}
      {!showTool && (
        <button onClick={() => setShowTool(true)} title="連線設定" style={{
          position: 'fixed', right: 12, bottom: 12, zIndex: 998,
          background: 'rgba(0,0,0,.4)', color: 'white', border: 'none',
          width: 36, height: 36, borderRadius: 18, cursor: 'pointer', fontSize: 14,
        }}>⚙</button>
      )}
    </>;
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
